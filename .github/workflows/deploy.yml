name: Deploy SpawnVault to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            git config --global --add safe.directory /home/el/web/spawnvault.respawnsociety.web.id/public_html
            cd /home/el/web/spawnvault.respawnsociety.web.id/public_html
            git pull origin main
            echo "Deploy selesai!"
